<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <nav class="h-20 border-b font-semibold text-3xl flex pl-5 items-end pb-2">
        <h1>Expense Tracker</h1>
    </nav>
    <main class="flex p-4 gap-4">
        <div class=" font-semibold border h-120 w-1/4  rounded-xl flex flex-col p-4 gap-2">
            <h1 class=" text-xl">Inputs:</h1>
            <div class="flex gap-1 flex-col ">
                <label for="salary">Your Salary:</label>
                <input class="h-8 w-50 border rounded-xl p-2 mb-1" type="number" id="salary"
                    placeholder="Enter your salary:">
                <div class="flex flex-col items-start mb-1 gap-3">
                    <div class="flex gap-1">
                        <label for="fromCurrency" >
                            From:
                        </label>

                        <select id="fromCurrency" class="w-70">
                        </select>
                    </div>
                    <button
                        class="border rounded-md p-1  px-3 cursor-pointer bg-gray-200 transition hover:scale-105 duration-200 active:scale-95"
                        onclick="convert()">Convert</button>
                    <div class="flex  gap-1">
                        <label for="toCurrency">to:<label>
                        <span>
                            <select id="toCurrency" class="w-70">
                            </select>
                        </span>
                    </div>
                </div>
                <button
                    class=" w-40 h-10 rounded-xl bg-yellow-400 text-white cursor-pointer hover:scale-105 transition duration-200 active:scale-95"
                    id="salaryBtn">Confirm
                    Salary</button>
            </div>
            <div class="flex gap-1 flex-col">
                <label for="expenseName">Expense Name:</label>
                <input class="h-8 w-50 border rounded-xl p-2 mb-2" type="text" id="expenseName"
                    placeholder="Enter your expense:">
                <label for="expenseValue">Expense Amount:</label>
                <input class="h-8 w-50 border rounded-xl p-2 mb-2" type="number" id="expenseValue"
                    placeholder="Enter your expense:">
                <button
                    class=" w-40 h-10 rounded-xl bg-red-500 text-white cursor-pointer  hover:scale-105 transition duration-200 active:scale-95"
                    id="expBtn">+
                    Expense</button>
            </div>
        </div>
        <div class="h-120 w-2/5 border rounded-xl">
            <div class="w-full border-b p-3 flex justify-around ">
                <div>
                    <h1 class="font-semibold text-xl ">Your Salary:</h1>
                    <span class="font-bold text-2xl text-green-500 " id="sal"></span>
                </div>
                <div>
                    <h1 class="font-semibold text-xl">Your Expenses:</h1>
                    <span class="font-bold text-2xl text-red-500 " id="totExp"></span>
                </div>
                <div>
                    <h1 class="font-semibold text-xl ">Remaining:</h1>
                    <span class="font-bold text-2xl " id="balance"></span>
                </div>
            </div>
            <div class="p-2">
                <div class="flex w-full justify-between px-3 items-center">
                    <h1 class="font-semibold text-xl mb-2">Your Expenses:</h1>
                    <i class="fa-solid fa-file-arrow-down text-gray-500 text-xl " title="Download pdf"
                        onclick="generatePDF()"></i>
                </div>
                <li class="w-full flex font-semibold" id="topExpBar">
                    <div class="border w-1/4 h-7 text-center rounded-tl-md">
                        S.no
                    </div>
                    <div class="border-b border-t border-r w-1/3 h-7 text-center">
                        Name
                    </div>
                    <div class="border-b border-t border-r w-1/3 h-7 text-center">
                        Amount
                    </div>
                    <div
                        class="border-b border-t rounded-tr-md border-r w-1/10 h-7 text-center border-black  text-red-500">
                        Del
                    </div>
                </li>

                <ul class="w-full flex flex-col  max-h-65 [scrollbar-width:none]  overflow-y-auto" id="expList">

                </ul>
            </div>
        </div>
        <div class="w-1/3 h-120 mx-auto">
            <canvas id="expenseChart"></canvas>
        </div>
    </main>
    <script src="app.js"></script>
</body>

</html>
